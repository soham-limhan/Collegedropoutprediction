
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students — Dropic.ai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  </head>
  <body class="dp-app min-h-screen text-slate-800 p-4 md:p-8 lg:p-10">
    <div class="max-w-7xl mx-auto">
    <header class="dp-hero mb-10 px-5 py-6 md:px-8 md:py-7">
      <div class="dp-hero-inner flex flex-col gap-5 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <p class="dp-kicker">Directory</p>
          <h1 class="dp-title text-2xl md:text-3xl lg:text-4xl">All students</h1>
          <p class="dp-sub mt-1 max-w-md">Sort columns, paginate results, and export the full roster.</p>
        </div>
        <div class="flex flex-wrap gap-2">
          <a class="dp-btn-ghost" href="/">Home</a>
          <a class="dp-btn-glow" href="/dashboard">Dashboard</a>
          <a class="inline-flex items-center rounded-xl border border-emerald-300/50 bg-emerald-400/15 px-4 py-2.5 text-sm font-semibold text-emerald-100 hover:bg-emerald-400/25 transition" href="{{ url_for('export_students_csv') }}">Export CSV</a>
        </div>
      </div>
    </header>
    <div class="p-5 md:p-6 dp-card dp-card-static relative">
      <div id="tableLoading" class="dp-skeleton absolute inset-4 z-10 rounded-xl hidden"></div>
      <div class="mb-5 flex flex-col sm:flex-row flex-wrap items-stretch sm:items-center gap-2">
        <input id="searchInput" type="text" class="flex-1 min-w-[12rem] rounded-xl border border-slate-200 bg-slate-50/80 px-4 py-2.5 text-slate-900 placeholder:text-slate-400" placeholder="Search by name..." />
        <button id="searchBtn" type="button" class="rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-5 py-2.5 text-sm font-semibold text-white shadow-md shadow-indigo-500/20 hover:from-indigo-500 hover:to-violet-500 transition">Search</button>
        <button id="clearBtn" type="button" class="rounded-xl border border-slate-200 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition">Clear</button>
      </div>
      <p id="pageInfo" class="text-sm text-slate-500 mb-3"></p>
      <div class="overflow-x-auto rounded-xl border border-slate-100">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-100/90 text-slate-600 text-xs font-bold uppercase tracking-wide">
            <tr>
              <th class="text-left px-4 py-3">#</th>
              <th class="text-left px-4 py-3"><button type="button" class="sort-hdr underline-offset-2 hover:underline" data-sort="name">Name</button></th>
              <th class="text-left px-4 py-3">Gender</th>
              <th class="text-left px-4 py-3"><button type="button" class="sort-hdr underline-offset-2 hover:underline" data-sort="age">Age</button></th>
              <th class="text-left px-4 py-3"><button type="button" class="sort-hdr underline-offset-2 hover:underline" data-sort="abs">Absences</button></th>
              <th class="text-left px-4 py-3"><button type="button" class="sort-hdr underline-offset-2 hover:underline" data-sort="grade">Grade</button></th>
              <th class="text-left px-4 py-3"><button type="button" class="sort-hdr underline-offset-2 hover:underline" data-sort="risk">Risk</button></th>
              <th class="text-left px-4 py-3 min-w-[8rem]">Note</th>
              <th class="text-left px-4 py-3"></th>
            </tr>
          </thead>
          <tbody id="rows" class="divide-y divide-slate-100 bg-white"></tbody>
        </table>
      </div>
      <div class="mt-4 flex flex-wrap items-center justify-between gap-2">
        <div class="flex gap-2">
          <button type="button" id="prevPage" class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 disabled:opacity-40">Previous</button>
          <button type="button" id="nextPage" class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 disabled:opacity-40">Next</button>
        </div>
        <label class="text-sm text-slate-600 flex items-center gap-2">Rows per page
          <select id="pageSizeSel" class="rounded-lg border border-slate-200 px-2 py-1 text-sm">
            <option>10</option>
            <option selected>25</option>
            <option>50</option>
          </select>
        </label>
      </div>
    </div>
    </div>

    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const loadEl = document.getElementById('tableLoading');
        try {
          if (loadEl) loadEl.classList.remove('hidden');
          const res = await fetch('/students');
          const students = await res.json();
          const tbody = document.getElementById('rows');
          const params = new URLSearchParams(window.location.search);
          const initialSearch = params.get('search') || '';
          const highlight = (params.get('highlight') || '').toLowerCase();
          const searchInput = document.getElementById('searchInput');
          const searchBtn = document.getElementById('searchBtn');
          const clearBtn = document.getElementById('clearBtn');
          const pageInfo = document.getElementById('pageInfo');
          const prevPage = document.getElementById('prevPage');
          const nextPage = document.getElementById('nextPage');
          const pageSizeSel = document.getElementById('pageSizeSel');
          searchInput.value = initialSearch;

          let sortKey = 'risk';
          let sortDir = 1;
          let currentPage = 1;
          let pageSize = 25;
          let working = [];

          function riskRank(rc) {
            const v = String(rc || '').toLowerCase();
            if (v === 'red') return 0;
            if (v === 'yellow') return 1;
            if (v === 'green') return 2;
            return 3;
          }

          function applySort(list) {
            const arr = [...list];
            arr.sort((a, b) => {
              let cmp = 0;
              if (sortKey === 'risk') cmp = riskRank(a.Risk_Category) - riskRank(b.Risk_Category);
              else if (sortKey === 'name') cmp = String(a.Name || '').localeCompare(String(b.Name || ''));
              else if (sortKey === 'age') cmp = (Number(a.Age) || 0) - (Number(b.Age) || 0);
              else if (sortKey === 'abs') cmp = (Number(a.Number_of_Absences ?? a.Absences) || 0) - (Number(b.Number_of_Absences ?? b.Absences) || 0);
              else if (sortKey === 'grade') {
                const ga = Number(a.Aggregate_Grade ?? a.Final_Grade ?? a.Grade_2 ?? a.Grade_1 ?? 0);
                const gb = Number(b.Aggregate_Grade ?? b.Final_Grade ?? b.Grade_2 ?? b.Grade_1 ?? 0);
                cmp = ga - gb;
              }
              return cmp * sortDir;
            });
            return arr;
          }

          function getFiltered() {
            const q = searchInput.value.trim().toLowerCase();
            if (!q) return students;
            return students.filter(s => String(s.Name || '').toLowerCase().includes(q));
          }

          function render() {
            working = applySort(getFiltered());
            const total = working.length;
            const pages = Math.max(1, Math.ceil(total / pageSize));
            if (currentPage > pages) currentPage = pages;
            const start = (currentPage - 1) * pageSize;
            const slice = working.slice(start, start + pageSize);
            tbody.innerHTML = '';
            slice.forEach((s, j) => {
              const tr = document.createElement('tr');
              const risk = String(s.Risk_Category || '').toLowerCase();
              let badge = '<span class="inline-flex px-2.5 py-0.5 rounded-lg text-xs font-bold bg-slate-200 text-slate-700">Unknown</span>';
              if (risk === 'red') badge = '<span class="inline-flex px-2.5 py-0.5 rounded-lg text-xs font-bold bg-red-100 text-red-800 ring-1 ring-red-200/80">Red</span>';
              else if (risk === 'yellow') badge = '<span class="inline-flex px-2.5 py-0.5 rounded-lg text-xs font-bold bg-amber-100 text-amber-900 ring-1 ring-amber-200/80">Yellow</span>';
              else if (risk === 'green') badge = '<span class="inline-flex px-2.5 py-0.5 rounded-lg text-xs font-bold bg-emerald-100 text-emerald-900 ring-1 ring-emerald-200/80">Green</span>';
              const idxDisp = start + j;
              tr.innerHTML = `
                <td class="px-4 py-3 text-slate-400 tabular-nums">${idxDisp}</td>
                <td class="px-4 py-3 font-semibold text-slate-900">${s.Name ?? 'Student'}</td>
                <td class="px-4 py-3 text-slate-600">${s.Gender ?? ''}</td>
                <td class="px-4 py-3 tabular-nums text-slate-700">${s.Age ?? ''}</td>
                <td class="px-4 py-3 tabular-nums text-slate-700">${s.Number_of_Absences ?? s.Absences ?? ''}</td>
                <td class="px-4 py-3 tabular-nums text-slate-700">${s.Aggregate_Grade ?? s.Final_Grade ?? s.Grade_2 ?? s.Grade_1 ?? 'N/A'}</td>
                <td class="px-4 py-3">${badge}</td>
                <td class="px-4 py-3 text-slate-600 max-w-xs">${s.Risk_Description ?? ''}</td>
                <td class="px-4 py-3"><a class="font-semibold text-indigo-600 hover:text-indigo-500 focus:outline-none focus-visible:ring-2 rounded" href="/edit_student?gindex=${encodeURIComponent(String(s._idx))}">Edit</a></td>
              `;
              if (highlight && String(s.Name || '').toLowerCase() === highlight) {
                tr.classList.add('bg-amber-50/90', 'ring-1', 'ring-inset', 'ring-amber-200/80');
              }
              tbody.appendChild(tr);
            });
            pageInfo.textContent = total ? `Showing ${start + 1}–${start + slice.length} of ${total}` : 'No rows match';
            prevPage.disabled = currentPage <= 1;
            nextPage.disabled = currentPage >= pages;
          }

          document.querySelectorAll('.sort-hdr').forEach(btn => {
            btn.addEventListener('click', () => {
              const k = btn.getAttribute('data-sort');
              if (sortKey === k) sortDir *= -1;
              else { sortKey = k; sortDir = 1; }
              currentPage = 1;
              render();
            });
          });

          prevPage.addEventListener('click', () => { if (currentPage > 1) { currentPage--; render(); } });
          nextPage.addEventListener('click', () => { currentPage++; render(); });
          pageSizeSel.addEventListener('change', () => {
            pageSize = parseInt(pageSizeSel.value, 10) || 25;
            currentPage = 1;
            render();
          });

          function filterList() { currentPage = 1; render(); }

          render();
          if (initialSearch) filterList();
          searchBtn.addEventListener('click', filterList);
          clearBtn.addEventListener('click', () => { searchInput.value = ''; currentPage = 1; render(); });
        } catch (e) {
          console.error(e);
          DPToast('Could not load students', { type: 'error' });
        } finally {
          if (loadEl) loadEl.classList.add('hidden');
        }
      });
    </script>
  </body>
</html>
