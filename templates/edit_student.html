<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit student — Dropic.ai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="dp-app min-h-screen text-slate-800 p-4 md:p-8">
  <div class="max-w-xl mx-auto">
    <a class="inline-flex text-sm font-semibold text-indigo-600 hover:text-violet-600 mb-6 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 rounded-lg px-1 -ml-1 transition" href="{{ url_for('students_view') }}">← Back to list</a>
    <div class="dp-card p-6 md:p-8">
      <p class="dp-kicker text-indigo-600 mb-1">Edit record</p>
      <h1 class="dp-page-title mb-6">Student details</h1>
      <form id="editForm" class="space-y-4">
        <input type="hidden" name="gindex" value="{{ idx }}" />
        <div>
          <label class="block text-sm font-semibold text-slate-700" for="name">Name</label>
          <input id="name" name="name" class="mt-1.5 border border-slate-200 bg-slate-50/80 p-2.5 w-full rounded-xl" value="{{ name }}" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700" for="gender">Gender</label>
            <select id="gender" name="gender" class="mt-1.5 border border-slate-200 bg-slate-50/80 p-2.5 w-full rounded-xl">
              <option value="F" {% if gender == 'F' %}selected{% endif %}>Female</option>
              <option value="M" {% if gender == 'M' %}selected{% endif %}>Male</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700" for="age">Age</label>
            <input id="age" type="number" name="age" class="mt-1.5 border border-slate-200 bg-slate-50/80 p-2.5 w-full rounded-xl" value="{{ age }}" />
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700" for="absences">Absences</label>
            <input id="absences" type="number" name="absences" class="mt-1.5 border border-slate-200 bg-slate-50/80 p-2.5 w-full rounded-xl" value="{{ absences }}" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700" for="aggregate_grade">Aggregate (0–20)</label>
            <input id="aggregate_grade" type="number" step="0.1" min="0" max="20" name="aggregate_grade" class="mt-1.5 border border-slate-200 bg-slate-50/80 p-2.5 w-full rounded-xl" value="{{ aggregate }}" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700" for="internet_access">Internet</label>
            <select id="internet_access" name="internet_access" class="mt-1.5 border border-slate-200 bg-slate-50/80 p-2.5 w-full rounded-xl">
              <option value="yes" {% if internet == 'yes' %}selected{% endif %}>Yes</option>
              <option value="no" {% if internet == 'no' %}selected{% endif %}>No</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700" for="desired_risk_zone">Desired risk zone</label>
          <select id="desired_risk_zone" name="desired_risk_zone" class="mt-1.5 border border-slate-200 bg-slate-50/80 p-2.5 w-full rounded-xl">
            <option value="" {% if not risk_zone %}selected{% endif %}>— None —</option>
            <option value="Red" {% if risk_zone == 'Red' %}selected{% endif %}>Red</option>
            <option value="Yellow" {% if risk_zone == 'Yellow' %}selected{% endif %}>Yellow</option>
            <option value="Green" {% if risk_zone == 'Green' %}selected{% endif %}>Green</option>
          </select>
        </div>
        <button id="saveBtn" class="w-full mt-2 py-3 px-4 rounded-xl font-semibold text-white bg-gradient-to-r from-indigo-600 to-violet-600 shadow-md shadow-indigo-500/25 hover:from-indigo-500 hover:to-violet-500 transition" type="submit">Save changes</button>
      </form>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
  <script>
    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveBtn');
      DPSetLoading(btn, true, 'Saving…');
      const payload = Object.fromEntries(new FormData(e.target).entries());
      try {
        const res = await fetch('/edit_student?gindex=' + encodeURIComponent(payload.gindex || payload.index), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          DPToast('Update failed: ' + (data.error || 'Unknown'), { type: 'error' });
          DPSetLoading(btn, false);
          return;
        }
        DPToast('Student updated', { type: 'success' });
        setTimeout(() => { window.location.href = '/students_view'; }, 800);
      } catch (err) {
        DPToast('Network error', { type: 'error' });
        DPSetLoading(btn, false);
      }
    });
  </script>
</body>
</html>
